name: DevOps CSV Automation CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  build-test-process:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if file --mime-encoding requirements.txt | grep -q utf-16; then
            iconv -f UTF-16LE -t UTF-8 -c requirements.txt -o requirements.txt.tmp && mv requirements.txt.tmp requirements.txt
          fi
          pip install -r requirements.txt

      - name: Lint with Flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # treat all other errors as warnings (exit-zero)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Check Formatting with Black
        run: black --check .

      - name: Security Scan
        run: |
          bandit -r src/
          safety check

      - name: Run Tests
        run: |
          pytest || (code=$?; if [ $code -eq 5 ]; then echo "No tests collected"; exit 0; else exit $code; fi)

      - name: Clean Output Directory
        run: rm -rf output

      - name: Run CSV Processing Script
        run: |
          python src/main.py

      - name: Commit and Push Changes
        if: github.event_name == 'push'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add output/
          if [[ -n $(git status -s) ]]; then
            git commit -m "Auto-generated processed data [skip ci]"
            git push origin HEAD:${{ github.ref }}
          fi

      - name: Upload Processed Data
        uses: actions/upload-artifact@v6
        with:
          name: processed-data
          path: output/
