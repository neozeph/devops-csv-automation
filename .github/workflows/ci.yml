name: DevOps CSV Automation CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  build-test-process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if file --mime-encoding requirements.txt | grep -q utf-16; then
            iconv -f UTF-16LE -t UTF-8 -c requirements.txt -o requirements.txt.tmp && mv requirements.txt.tmp requirements.txt
          fi
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          pytest || (code=$?; if [ $code -eq 5 ]; then echo "No tests collected"; exit 0; else exit $code; fi)

      - name: Run CSV Processing Script
        run: |
          python src/main.py
